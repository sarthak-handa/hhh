      /* --- LOADER CSS FIXED (New Spinner) --- */
      #loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #020617; /* slate-950 */
        z-index: 9999; display: flex; justify-content: center; align-items: center;
        transition: opacity 0.4s ease-out;
      }
      .cyber-loader {
        width: 60px; height: 60px;
        border: 3px solid transparent;
        border-top-color: #38bdf8; /* bright blue */
        border-bottom-color: #f43f5e; /* rose */
        border-radius: 50%;
        animation: cyber-spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        box-shadow: 0 0 20px rgba(56,189,248,0.5), inset 0 0 20px rgba(244,63,94,0.5);
        position: relative;
      }
      .cyber-loader::before {
        content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px;
        border: 3px solid transparent;
        border-left-color: #f43f5e; border-right-color: #38bdf8;
        border-radius: 50%;
        animation: cyber-spin-reverse 0.5s linear infinite;
      }
      @keyframes cyber-spin { 100% { transform: rotate(360deg); } }
      @keyframes cyber-spin-reverse { 100% { transform: rotate(-360deg); } }

      .hidden-loader {
        opacity: 0;
        pointer-events: none;
      }

      .userImg {
        height: 20px !important;
      }
      :root {
        --brand-red: #f43f5e;
        --brand-pink: #fb7185;
        --brand-dark: #0f172a;
      }
      body {
        background-color: #020617 !important; /* ultra dark slate */
        color: #f1f5f9; /* slate-100 */
      }
      .glass-panel {
        background: rgba(15, 23, 42, 0.65) !important; /* slate-900 opacity */
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
      }
      /* Custom glowing scrollbar for dark mode */
      .custom-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
      .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
      .custom-scroll::-webkit-scrollbar-thumb { 
        background: linear-gradient(180deg, #38bdf8, #818cf8); 
        border-radius: 10px; 
        box-shadow: inset 0 0 6px rgba(0,0,0,0.3);
      }

      .kpi-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;

      .kpi-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 30px -5px rgba(56, 189, 248, 0.2);

      }
      .expand-row {
        animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        transform-origin: top;
      }
      @keyframes slideDown {
        from { opacity: 0; transform: scaleY(0); max-height: 0; }
        to { opacity: 1; transform: scaleY(1); }
      }
      .custom-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
        padding-right: 2.5rem;
        -webkit-appearance: none;
        appearance: none;
        background-color: transparent;
        color: #f1f5f9;

    <script>
      let database = [];
      const loader = document.getElementById("loader");
      function changeAssemblySort(mode) {
        state.assemblySort = mode;
        updateDashboard(); // Trigger re-render to apply sort
      }

      // --- 1. DATA LOADING & PARSING ---
      async function loadDashboardData() {
        loader.classList.remove("hidden-loader");

        const monthSet = new Set();
        const MONTH_ORDER = [
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
          "Jan",
          "Feb",
          "Mar",
        ];

        const endpoint =
          state.context === "forecast"
            ? `${API_URL}/excel/forecast/dashboard`
            : `${API_URL}/excel/actuals/dashboard`;

        try {
          const res = await fetch(endpoint);

          // Authorization bypass for serverless mode
          /*
          if (res.status === 401) {
            handleUnauthorized?.("Unauthorized");
            return;
          }
          */
          if (!res.ok) throw new Error("Fetch failed");

          const dbExcel = await res.json();
          // Uncomment below to see the actual keys if needed in DevTools
          // console.log("Excel row keys:", Object.keys(dbExcel.data[0]));

          // FY span removed per user request

          const formatDate = (iso) => {
            if (!iso) return "";
            const d = new Date(iso);
            const pad = (n) => String(n).padStart(2, "0");
            return `${pad(d.getDate())}-${pad(
              d.getMonth() + 1,
            )}-${d.getFullYear()}`;
          };
          // const updatedDate = formatDate(dbExcel.lastUpdated);
          if (state.context === "forecast") {
            // $("#excelUpdateTimeDiv").show();
            // $("#excelUpdateTimeDiv2").hide();
            document.getElementById("excelUpdateTimeDiv").style.display =
              "block";
            document.getElementById("excelUpdateTimeDiv2").style.display =
              "none";
          } else {
            // $("#excelUpdateTimeDiv2").show();
            // $("#excelUpdateTimeDiv").hide();
            document.getElementById("excelUpdateTimeDiv2").style.display =
              "block";
            document.getElementById("excelUpdateTimeDiv").style.display =
              "none";
          }
          const updatedDate = dateNtime(dbExcel.lastUpdated);
          document.getElementById("excelUpdateTime").innerText =
            "(last updated at " + updatedDate + ")";
          document.getElementById("excelUpdateTime2").innerText =
            "(last updated at " + updatedDate + ")";
          database = dbExcel.data.map((item, index) => {
            if (item.month) monthSet.add(item.month);
            const rawVal = String(item.billing || 0).replace(/[^0-9.-]/g, "");
            const val = parseFloat(rawVal) || 0;

            return {
              id: index + 1,
              name: item.project,
              pm: item.pm,
              product: item.category,
              month: item.month ? item.month.trim() : "",
              monthDisplay: item.monthDisplay || "",   // "May/26" format
              status: item.status || "Not Dispatched",
              source: item.source || "",
              val: val,
              date: formatDate(item.dispatchMonth),
              context: state.context,
              assembly: item.assembly,
              line: item.line,
              year: formatDate(item.dispatchMonth).split("-")[2],
            };
          });

          // --- CALCULATE DATE RANGE AND UPDATE HEADING ---
          const distinctMonths = [...monthSet].sort(
            (a, b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b),
          );

          // Month range text removed from header per request

          populateMonthFilter(distinctMonths);
          updateDashboard();
        } catch (err) {
          console.error("Data load failed:", err);
        } finally {
          loader.classList.add("hidden-loader");
        }
      }

      // --- 2. STATE MANAGEMENT ---
      let state = {
        context: "forecast",
        filters: { month: [], status: null },
        selection: { pm: null, product: null, month: null },
        expandedRows: [],
        sort: { key: "billing", direction: "desc" },
        assemblySort: "default",
      };

      const charts = {};

      function init() {
        initCharts();
        loadDashboardData();
      }

      function switchDataContext(context) {
        if (state.context === context) return;
        state.context = context;

        // --- BUTTON STYLES ---
        const forBtn = document.getElementById("toggle-forecast");
        const actBtn = document.getElementById("toggle-actuals");
        const statusContainer = document.getElementById(
          "dispatch-status-container",
        );

        if (context === "forecast") {
          statusContainer.style.display = "flex";
          forBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded bg-yogi-red text-white shadow-sm";
          actBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded text-gray-500 hover:text-gray-700";
        } else {
          statusContainer.style.display = "none";
          actBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded bg-yogi-red text-white shadow-sm";
          forBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded text-gray-500 hover:text-gray-700";
          state.filters.status = null;
          document.getElementById("filter-status").value = "all";
        }

        // --- GRID LAYOUT ---
        const colBar = document.getElementById("col-bar");
        const colPie = document.getElementById("col-pie");
        const colLine = document.getElementById("col-line");

        colPie.classList.remove("xl:col-span-4", "xl:col-span-3", "md:col-span-2");
        colLine.classList.remove("xl:col-span-4", "md:col-span-2", "xl:col-span-5");

        if (context === "forecast") {
          colPie.classList.add("xl:col-span-4");
          colLine.classList.add("xl:col-span-4", "md:col-span-2");
        } else {
          colPie.classList.add("xl:col-span-3");
          colLine.classList.add("xl:col-span-5", "md:col-span-2");
        }

        setTimeout(() => {
          if (charts.bar) charts.bar.resize();
          if (charts.pie) charts.pie.resize();
          if (charts.line) charts.line.resize();
        }, 50);

        updateLabels(context);
        loadDashboardData();
      }

      function updateLabels(context) {
        const barTitle = document.querySelector("#col-bar h3");
        const pieTitle = document.querySelector("#col-pie h3");
        const lineTitle = document.querySelector("#col-line h3");

        const billingHead = document.querySelector("#billingHead p");
        const assemblyHead = document.querySelector("#assemblyHead p");
        const avgMonthlyHead = document.querySelector("#avgMonthlyHead p");

        if (context === "forecast") {
          if (billingHead) billingHead.innerText = "FORECASTED BILLING VALUE";
          if (assemblyHead)
            assemblyHead.innerText = "ASSEMBLIES TO BE DISPATCHED";
          if (avgMonthlyHead)
            avgMonthlyHead.innerText = "AVERAGE MONTHLY FORECAST";

          if (barTitle) barTitle.innerText = "FORECASTED BILLING ALLOCATION";
          if (pieTitle)
            pieTitle.innerText = "FORECASTED BILLING BY PRODUCTION LINE";
          if (lineTitle) lineTitle.innerText = "FORECASTED MONTHLY BILLING";
        } else {
          if (billingHead) billingHead.innerText = "ACTUAL BILLING VALUE";
          if (assemblyHead) assemblyHead.innerText = "ASSEMBLIES DISPATCHED";
          if (avgMonthlyHead)
            avgMonthlyHead.innerText = "AVERAGE MONTHLY BILLING";

          if (barTitle) barTitle.innerText = "REVENUE BY PROJECT MANAGER";
          if (pieTitle)
            pieTitle.innerText = "ASSEMBLIES DISPATCHED DISTRIBUTION";
          if (lineTitle) lineTitle.innerText = "MONTHLY REVENUE";
        }
      }

      // --- 3. FILTERING LOGIC ---
      function getData(mode = "highlight") {
        return database.filter((row) => {
          // --- UPDATED SMART FILTER LOGIC ---
          if (state.filters.status) {
            const filterVal = state.filters.status;

            // If selected value is a Status (from Col H)
            if (["Dispatched", "Not Dispatched", "Hold"].includes(filterVal)) {
              if (row.status !== filterVal) return false;
            }
            // If selected value is a Source (from Col B)
            else if (["BOI", "Inhouse"].includes(filterVal)) {
              if (row.source !== filterVal) return false;
            }
          }

          if (
            state.filters.month.length > 0 &&
            !state.filters.month.includes(row.month)
          )
            return false;
          if (mode === "highlight") {
            if (state.selection.pm && row.pm !== state.selection.pm)
              return false;
            if (
              state.selection.product &&
              row.product !== state.selection.product
            )
              return false;
            if (state.selection.month && row.month !== state.selection.month)
              return false;
          }
          return true;
        });
      }

      // --- 🔴 UPDATED: RESET CHART SELECTION ON DROPDOWN CHANGE ---
      function applySlicer(type, value) {
        state.filters[type] = value === "all" ? null : value;
        // 🔴 FIX: Clear chart selections so the dropdown applies globally
        state.selection = { pm: null, product: null, month: null };
        updateDashboard();
      }

      function applyChartFilter(type, value) {
        state.selection[type] = state.selection[type] === value ? null : value;
        updateDashboard();
      }

      function resetAllFilters() {
        state.filters = { month: [], status: null };
        state.selection = { pm: null, product: null, month: null };
        document.getElementById("filter-status").value = "all";
        document.getElementById("monthBtnText").innerText = "All Months";
        document
          .querySelectorAll("#monthDropdownList input")
          .forEach((cb) => (cb.checked = false));
        updateDashboard();
      }

      // --- 4. DASHBOARD UPDATES ---
      function updateDashboard() {
        const baseData = getData("base");
        const highlightData = getData("highlight");
        const hasSelection =
          state.selection.pm ||
          state.selection.product ||
          state.selection.month;
        const activeData = hasSelection ? highlightData : baseData;

        updateKPIs(activeData);
        updateVisuals(baseData, highlightData, hasSelection);
        renderTable(activeData);
        updateFilterChips();
      }

      function updateKPIs(data) {
        const totalVal = data.reduce((sum, d) => sum + d.val, 0);
        const totalProj = new Set(data.map((d) => d.name)).size;
        const totalAssm = data.filter(
          (d) => d.assembly && d.assembly.trim() !== "",
        ).length;

        // Average monthly: divide by 12 if no months selected, else by selected month count
        const selectedMonthCount = state.filters.month.length;
        const divisor = selectedMonthCount > 0 ? selectedMonthCount : 12;

        document.getElementById("kpi-projects").innerText = totalProj;
        document.getElementById("kpi-revenue").innerText =
          "₹ " +
          (totalVal / 10000000).toLocaleString("en-IN", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }) +
          " Cr";
        document.getElementById("kpi-assemblies").innerText = totalAssm;

        const avg = divisor > 0 ? totalVal / 10000000 / divisor : 0;
        document.getElementById("kpi-avg").innerText =
          "₹ " +
          avg.toLocaleString("en-IN", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }) +
          " Cr";
      }

      // --- CHART DATA UPDATES ---
      // --- CHART DATA UPDATES ---
      // --- CHART DATA UPDATES ---
      function updateVisuals(baseData, highlightData, hasSelection) {
        const FISCAL_MONTH_ORDER = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
        const colors = {
          red: "#a81818",
          pink: "#fca5a5",
          gray: "#e5e7eb",
          // Extended palette for production line distribution (matches reference)
          pieBase: [
            "#B02A37", "#2E4F6E", "#8C1D2D", "#E8A838", "#6C757D",
            "#ADB5BD", "#D4A574", "#4A7C59", "#C4553A", "#7B6B8D",
            "#E5E0DA", "#3B7DD8", "#9B2335", "#5C8A4D", "#D98C5F",
          ],
        };

        const groupBy = (data, key) => {
          const map = {};
          data.forEach((d) => {
            map[d[key]] = (map[d[key]] || 0) + d.val;
          });
          return map;
        };

        // --- 1. BAR CHART ---
        const pmData = groupBy(baseData, "pm");
        const pmHighlightSet = hasSelection
          ? new Set(highlightData.map((d) => d.pm))
          : null;
        const sortedPMs = Object.keys(pmData).sort(
          (a, b) => pmData[a] - pmData[b],
        );

        charts.bar.data.labels = sortedPMs;
        charts.bar.data.datasets = [
          {
            data: sortedPMs.map((pm) => (pmData[pm] / 10000000).toFixed(2)),
            backgroundColor: sortedPMs.map((pm) => {
              if (!hasSelection) return colors.red;
              return pmHighlightSet.has(pm) ? colors.red : colors.pink;
            }),
            borderRadius: 4,
            barThickness: 25,
          },
        ];
        charts.bar.update();

        // --- 2. PIE / DONUT CHART ---
        if (state.context === "forecast") {
          // FORECAST: Donut, Legend Right, Labels Outside (Value Only)
          const prodData = groupBy(baseData, "product");
          const prodHighlightSet = new Set(highlightData.map((d) => d.product));

          charts.pie.options.cutout = "50%";
          charts.pie.options.layout.padding = 30;
          charts.pie.options.plugins.legend.display = true;
          
          charts.pie.options.plugins.datalabels = {
            display: true,
            color: "#333",
            anchor: "end",
            align: "end",
            offset: 5,
            font: { weight: "bold", size: 10 },
            formatter: (val) => (val / 10000000).toFixed(2),
          };

          charts.pie.data.labels = Object.keys(prodData);
          charts.pie.data.datasets = [
            {
              data: Object.values(prodData),
              backgroundColor: Object.keys(prodData).map((p, i) =>
                !hasSelection || prodHighlightSet.has(p)
                  ? colors.pieBase[i % colors.pieBase.length]
                  : colors.gray,
              ),
              borderColor: "#fff",
              borderWidth: 2,
            },
          ];
        } else {
          // REVENUE: Pie, No Legend, Labels Outside (Name + Value)
          const pmCountMap = {};
          baseData.forEach((d) => {
            // Count occurrences of Assemblies (Column D)
            if (d.assembly && d.assembly.trim() !== "")
              pmCountMap[d.pm] = (pmCountMap[d.pm] || 0) + 1;
          });

          // UPDATED LOGIC: Sort by Count Descending
          const sortedEntries = Object.entries(pmCountMap).sort(
            (a, b) => b[1] - a[1],
          );
          const pmKeys = sortedEntries.map((e) => e[0]);
          const pmValues = sortedEntries.map((e) => e[1]);

          charts.pie.options.cutout = "0%";
          charts.pie.options.layout.padding = 60;
          charts.pie.options.plugins.legend.display = false;
          charts.pie.options.plugins.datalabels = {
            display: true,
            color: "#333",
            anchor: "end",
            align: "end",
            offset: 5,
            font: { weight: "bold", size: 10 },
            formatter: (val, ctx) =>
              `${ctx.chart.data.labels[ctx.dataIndex]} ${val}`,
          };

          charts.pie.data.labels = pmKeys;
          charts.pie.data.datasets = [
            {
              data: pmValues,
              backgroundColor: pmKeys.map(
                (k, i) => colors.pieBase[i % colors.pieBase.length],
              ),
              borderColor: "#fff",
              borderWidth: 1,
            },
          ];
        }
        charts.pie.update();

        // --- 3. LINE CHART (Fiscal order: Apr → Mar) ---
        const monthData = groupBy(baseData, "month");
        const monthHighlightSet = new Set(highlightData.map((d) => d.month));
        const labels = Object.keys(monthData).sort(
          (a, b) => FISCAL_MONTH_ORDER.indexOf(a) - FISCAL_MONTH_ORDER.indexOf(b)
        );

        charts.line.data.labels = labels;
        charts.line.data.datasets = [
          {
            data: labels.map((m) => (monthData[m] / 10000000).toFixed(2)),
            borderColor: colors.red,
            backgroundColor: "rgba(168, 24, 24, 0.05)",
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointBackgroundColor: labels.map((m) =>
              !hasSelection || monthHighlightSet.has(m) ? colors.red : "#fff",
            ),
          },
        ];
        charts.line.update();
      }

      // --- 5. TABLE LOGIC ---
      function renderTable(data) {
        const tbody = document.getElementById("table-body");

        const uniqueProjects = new Set(data.map((d) => d.name));

        document.getElementById("table-count").innerText =
          `${uniqueProjects.size} Projects`;

        tbody.innerHTML = "";

        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">No projects match filters</td></tr>`;

          return;
        }

        // Group data by Project

        const grouped = Object.values(
          data.reduce((acc, item) => {
            if (!acc[item.name]) {
              acc[item.name] = {
                name: item.name,

                pm: item.pm,

                items: [],

                totalVal: 0,
              };
            }

            acc[item.name].totalVal += item.val || 0;

            // Only push to items array if there is a valid assembly name
            if (item.assembly && item.assembly.toString().trim() !== "" && item.assembly !== "—") {
              acc[item.name].items.push(item);
            }

            return acc;
          }, {}),
        );

        let result = grouped;

        window.currentTableData = result;

        // Main Table Sorting (Projects)

        if (state.sort.key === "billing") {
          result.sort((a, b) =>
            state.sort.direction === "asc"
              ? a.totalVal - b.totalVal
              : b.totalVal - a.totalVal,
          );
        }

        result.forEach((row, idx) => {
          const rowId = `proj_${idx}`;

          const isExpanded = state.expandedRows.includes(rowId);

          const tr = document.createElement("tr");

          tr.className = `hover:bg-slate-800/50 transition group ${
            isExpanded ? "bg-slate-800/80" : "bg-transparent"
          }`;

          tr.innerHTML = `
<td class="px-6 py-4">
<button onclick="toggleProjectExpansion('${rowId}')" class="w-6 h-6 flex items-center justify-center rounded border ${
            isExpanded
              ? "bg-sky-500 border-sky-500 text-slate-900 shadow-[0_0_10px_rgba(56,189,248,0.5)]"
              : "border-slate-600 text-slate-400 hover:border-sky-400 hover:text-sky-400"
          } transition">

          ${isExpanded ? "−" : "+"}
</button>
</td>
<td class="px-6 py-4 font-bold text-slate-200 tracking-wide">${row.name}</td>
<td class="px-6 py-4 text-slate-400">${row.pm}</td>
<td class="px-6 py-4 text-right font-bold text-sky-400">₹${row.totalVal.toLocaleString(
            "en-IN",
          )}</td>

    `;

          tbody.appendChild(tr);

          if (isExpanded) {
            const childTr = document.createElement("tr");

            childTr.className = "bg-[#020617]/60";

            let headerHtml = "",
              itemsHtml = "";

            // --- NEW SORTING LOGIC START ---

            // Clone items to sort without mutating original reference immediately

            let sortedItems = [...row.items];

            // Helper to get comparable integer from DD-MM-YYYY (e.g., 202601)

            const getDateVal = (d) => {
              if (!d) return 999999;

              const p = d.split("-");

              // Returns YYYYMM for integer comparison

              return parseInt(p[2] + p[1]);
            };

            sortedItems.sort((a, b) => {
              // Mode: DEFAULT (Complex Hierarchy)

              if (state.assemblySort === "default") {
                // 1. Dispatch Status: "Dispatched" (green) on top

                const statA = a.status === "Dispatched" ? 0 : 1;

                const statB = b.status === "Dispatched" ? 0 : 1;

                if (statA !== statB) return statA - statB;

                // 2. Month: Ascending (Jan, then Feb...)

                const dateA = getDateVal(a.date);

                const dateB = getDateVal(b.date);

                if (dateA !== dateB) return dateA - dateB;

                // 3. Billing: Descending (High Value first)

                if (b.val !== a.val) return b.val - a.val;

                // 4. Name: Ascending (A-Z)

                return (a.assembly || "").localeCompare(b.assembly || "");
              }

              // Mode: User Overrides
              else if (state.assemblySort === "valDesc") return b.val - a.val;
              else if (state.assemblySort === "dateAsc")
                return getDateVal(a.date) - getDateVal(b.date);
              else if (state.assemblySort === "nameAsc")
                return (a.assembly || "").localeCompare(b.assembly || "");

              return 0;
            });

            // --- NEW SORTING LOGIC END ---

            if (state.context === "forecast") {
              // Modified Header with Sort Dropdown

              headerHtml = `
<div class="grid grid-cols-3 items-end mb-2 border-b border-slate-700 pb-2 w-full">
<div class="text-left">
<h4 class="text-xs font-bold text-sky-400/80 uppercase tracking-widest">Assembly Breakdown</h4>
</div>
<div class="text-center">
<h4 class="text-xs font-bold text-sky-400/80 uppercase tracking-widest">Dispatch Track</h4>
</div>
<div class="flex justify-end items-center gap-2">
<span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sort By:</span>
<select onchange="changeAssemblySort(this.value)" class="text-xs border border-slate-600 rounded bg-slate-800 text-slate-200 focus:ring-1 focus:ring-sky-400 focus:border-sky-400 p-1 cursor-pointer transition-colors" style="width:140px;">
<option value="default" ${
                state.assemblySort === "default" ? "selected" : ""
              }>Default (Status > Date)</option>
<option value="valDesc" ${
                state.assemblySort === "valDesc" ? "selected" : ""
              }>Billing (High-Low)</option>
<option value="dateAsc" ${
                state.assemblySort === "dateAsc" ? "selected" : ""
              }>Date (Old-New)</option>
<option value="nameAsc" ${
                state.assemblySort === "nameAsc" ? "selected" : ""
              }>Name (A-Z)</option>
</select>
</div>
</div>

        `;

              itemsHtml = sortedItems

                .map((i) => {
                  const badgeClass =
                    i.status === "Dispatched"
                      ? "success-badge"
                      : "danger-badge"; // Added danger-badge for Not Dispatched if needed, or keep blank

                  // Note: Your CSS only defined success-badge and danger-badge.

                  // If status is not 'Dispatched', defaults to red/danger style logic if needed.

                  // Using standard text color logic from previous code, or badge if strictly required.

                  // Logic to color the dispatch date/status based on your requirement

                  const statusBadge =
                    i.status === "Dispatched"
                      ? `<span class="success-badge">${i.monthDisplay || (i.month + '/' + (i.year || '').slice(-2))}</span>`
                      : `<span>${i.monthDisplay || (i.month + '/' + (i.year || '').slice(-2))}</span>`;

                  return `<div class="grid grid-cols-3 items-center py-2 border-b border-slate-700/50 last:border-0 text-sm hover:bg-slate-800/50 transition-colors w-full gap-4">
<span class="text-slate-300 pl-4 border-l-2 ${
                    i.status === "Dispatched"
                      ? "border-emerald-500"
                      : "border-slate-500"
                  }">

                ${i.assembly || "—"}
</span>
<span class="text-slate-400 flex items-center justify-center text-center">${statusBadge}</span>
<span class="text-right font-bold text-sky-300">₹${i.val.toLocaleString(
                    "en-IN",
                  )}</span></div>`;
                })

                .join("");
            } else {
              // Keep existing layout for 'actuals' context if necessary, or update similarly

              headerHtml = `<h4 class="col-12 text-xs font-bold text-sky-400/80 uppercase mb-2 tracking-widest">Assembly Breakdown</h4>`;

              itemsHtml = sortedItems

                .map(
                  (i) =>
                    `<div class="row py-2 border-b border-slate-700/50 last:border-0 text-sm"><span class="col-12 text-slate-300 pl-4 border-l-2 border-slate-500">${
                      i.assembly || "—"
                    }</span></div>`,
                )

                .join("");
            }

            if (sortedItems.length === 0)
              itemsHtml = `<div class="p-3 text-center text-slate-500 text-xs italic">No detailed assemblies available</div>`;

            childTr.innerHTML = `<td colspan="6" class="p-0"><div class="expand-row px-6 py-4 shadow-inner bg-slate-900 border-x border-b border-slate-700 mx-4 mb-4 rounded-b-lg"><div class="row mb-3"><button class="bg-rose-500 text-white px-3 py-1 rounded-md text-xs font-bold hover:bg-rose-600 transition shadow-[0_0_8px_rgba(244,63,94,0.5)]" onclick="generateProjectPDF('${rowId}')"><i class="fa-solid fa-file-pdf mr-2"></i> Download PDF Report</button></div>${headerHtml}${itemsHtml}</div></td>`;

            tbody.appendChild(childTr);
          }
        });
      }

      function toggleProjectExpansion(id) {
        const idx = state.expandedRows.indexOf(id);
        if (idx > -1) state.expandedRows.splice(idx, 1);
        else state.expandedRows.push(id);
        updateDashboard();
      }

      function updateFilterChips() {
        const container = document.getElementById("active-filters-container");
        container.innerHTML = "";
        let hasFilter = false;
        const allFilters = { ...state.filters, ...state.selection };

        Object.entries(allFilters).forEach(([key, val]) => {
          if (val && (Array.isArray(val) ? val.length > 0 : true)) {
            hasFilter = true;
            const isSelection = key in state.selection;
            const bgClass = isSelection
              ? "bg-red-100 text-red-800"
              : "bg-blue-100 text-blue-800";
            const displayVal = Array.isArray(val)
              ? `${val.length} Months`
              : val;
            const chip = document.createElement("div");
            chip.className = `${bgClass} text-xs font-semibold px-2 py-1 rounded flex items-center gap-1`;
            const closeAction = isSelection
              ? `applyChartFilter('${key}', '${val}')`
              : `applySlicer('${key}', 'all'); if(document.getElementById('filter-${key}')) document.getElementById('filter-${key}').value='all'`;
            chip.innerHTML = `<span>${key.toUpperCase()}: ${displayVal}</span><button onclick="${closeAction}" class="hover:text-red-600 font-bold">&times;</button>`;
            container.appendChild(chip);
          }
        });
        container.classList.toggle("hidden", !hasFilter);
      }

      function toggleBillingSort() {
        state.sort.direction = state.sort.direction === "asc" ? "desc" : "asc";
        document.getElementById("billingSortIcon").innerText =
          state.sort.direction === "asc" ? "▲" : "▼";
        updateDashboard();
      }

      function populateMonthFilter(months) {
        const list = document.getElementById("monthDropdownList");
        list.innerHTML = "";
        if (months.length === 0) {
          list.innerHTML = `<div class="p-2 text-xs text-gray-500">No data</div>`;
          return;
        }
        months.forEach((m) => {
          const item = document.createElement("div");
          item.className =
            "flex items-center px-4 py-2 bg-slate-800/80 hover:bg-slate-700 cursor-pointer transition-colors border-b border-slate-700/50 last:border-0";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = state.filters.month.includes(m);
          checkbox.className =
            "form-checkbox h-4 w-4 rounded border-slate-600 bg-slate-900 focus:ring-sky-400 text-sky-400 pointer-events-none";
          const span = document.createElement("span");
          span.className = "ml-3 text-sm text-slate-200 select-none font-medium";
          span.innerText = m;
          item.appendChild(checkbox);
          item.appendChild(span);
          item.onclick = (e) => {
            e.stopPropagation();
            toggleMonthFilter(m);
            checkbox.checked = state.filters.month.includes(m);
          };
          list.appendChild(item);
        });
      }

      function toggleMonthFilter(month) {
        const idx = state.filters.month.indexOf(month);
        if (idx > -1) state.filters.month.splice(idx, 1);
        else state.filters.month.push(month);
        document.getElementById("monthBtnText").innerText =
          state.filters.month.length === 0
            ? "All Months"
            : `${state.filters.month.length} Selected`;
        updateDashboard();
      }

      function toggleMonthDropdown() {
        document.getElementById("monthDropdownList").classList.toggle("hidden");
      }
      window.addEventListener("click", (e) => {
        const btn = document.getElementById("monthDropdownBtn");
        const list = document.getElementById("monthDropdownList");
        if (!btn.contains(e.target) && !list.contains(e.target))
          list.classList.add("hidden");
      });

      document.addEventListener("DOMContentLoaded", init);

      async function generateProjectPDF(rowId) {
        const { jsPDF } = window.jspdf;
        let project;
        if (String(rowId).startsWith("proj_")) {
          const idx = parseInt(rowId.split("_")[1]);
          project = window.currentTableData[idx];
        } else {
          project = window.currentTableData.find((p) => p.id === rowId);
        }

        if (!project) {
          alert("Error: Project data not found.");
          return;
        }

        const doc = new jsPDF();
        const brandRed = "#a81818";
        const logo = document.getElementById("pdfLogo");
        if (logo) doc.addImage(logo, "PNG", 14, 10, 40, 15);

        // --- DYNAMIC CONTENT LOGIC ---
        const isForecast = state.context === "forecast";
        const reportTitle = isForecast
          ? "Detailed Forecast Assembly Overview"
          : "Detailed Actual Assembly Overview";

        const fyText = isForecast ? "FY 2026-27" : "FY 2025-26";

        doc.setFontSize(15);
        doc.setTextColor(brandRed);
        doc.text(reportTitle, 14, 34);

        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text(fyText, 14, 40);

        const startY = 46;
        doc.setFillColor(245, 245, 245);
        doc.rect(14, startY, 182, 20, "F");

        doc.setFontSize(10);
        doc.setTextColor(0);
        doc.setFont("helvetica", "bold");
        doc.text("Project Name:", 18, startY + 8);
        doc.setFont("helvetica", "normal");
        doc.text(project.name, 18, startY + 14);

        doc.setFont("helvetica", "bold");
        doc.text("Project Manager:", 90, startY + 8);
        doc.setFont("helvetica", "normal");
        doc.text(project.pm, 90, startY + 14);

        // Only show Total Value if in Forecast mode
        // if (isForecast) {
        doc.setFont("helvetica", "bold");
        doc.text("Total Billing Value:", 140, startY + 8);
        doc.setFont("helvetica", "normal");
        doc.text(
          `Rs. ${project.totalVal.toLocaleString("en-IN")}`,
          140,
          startY + 14,
        );
        // }

        // --- DYNAMIC TABLE COLUMNS ---
        let tableHead, tableBody, columnStyles;

        if (isForecast) {
          tableHead = [
            ["Assembly Name", "Dispatch Track", "Billing Value (INR)"],
          ];
          tableBody = project.items.map((item) => [
            item.assembly,
            `${item.month} ${item.year}`,
            item.val.toLocaleString("en-IN"),
          ]);
          columnStyles = { 2: { halign: "right" } };
        } else {
          // For Actuals: Remove Date and Value columns
          tableHead = [["Assembly Name"]];
          tableBody = project.items.map((item) => [item.assembly]);
          columnStyles = {};
        }

        doc.autoTable({
          startY: startY + 26,
          head: tableHead,
          body: tableBody,
          theme: "grid",
          headStyles: {
            fillColor: brandRed,
            textColor: 255,
            fontStyle: "bold",
          },
          columnStyles: columnStyles,
          styles: { fontSize: 9, cellPadding: 3 },
        });

        const prefix = isForecast ? "forecast" : "actual";
        const safeName = project.name.replace(/[^a-z0-9]/gi, "_").toLowerCase();
        doc.save(`${prefix}_${safeName}_report.pdf`);
      }

      function generateRankedMonthPDF() {
        const { jsPDF } = window.jspdf;
        if (!window.currentTableData || window.currentTableData.length === 0) {
          alert("No data available to export.");
          return;
        }
        const doc = new jsPDF();
        const brandRed = "#a81818";
        const logo = document.getElementById("pdfLogo");
        if (logo) doc.addImage(logo, "PNG", 14, 10, 40, 15);

        // --- DYNAMIC DATA CALCULATION ---
        const isForecast = state.context === "forecast";
        const reportTitle = isForecast
          ? "Project Forecast Report"
          : "Actual Revenue Report";
        const totalLabel = isForecast
          ? "TOTAL FORECAST"
          : "TOTAL ACTUAL REVENUE";

        // Added static text since FY span was removed
        const fyText = isForecast ? "FY 2026-27" : "FY 2025-26";

        // Determine Date Range from Filters
        let dateRangeText = "Full Financial Year";
        if (state.filters.month && state.filters.month.length > 0) {
          const MONTH_ORDER = [
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec",
            "Jan",
            "Feb",
            "Mar",
          ];
          const selected = [...state.filters.month].sort(
            (a, b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b),
          );

          if (selected.length === 1) {
            dateRangeText = `Month: ${selected[0]}`;
          } else {
            dateRangeText = `Period: ${selected[0]} to ${
              selected[selected.length - 1]
            }`;
          }
        }

        // --- PDF HEADER ---
        doc.setFontSize(16);
        doc.setTextColor(brandRed);
        doc.text(reportTitle, 14, 35);

        doc.setFontSize(10);
        doc.setTextColor(100);
        // This adds "FY 2025-26 | Period: Apr to Aug" under the title
        doc.text(`${fyText}  |  ${dateRangeText}`, 14, 42);

        const rankedData = [...window.currentTableData].sort(
          (a, b) => b.totalVal - a.totalVal,
        );
        const totalBilling = rankedData.reduce((sum, p) => sum + p.totalVal, 0);

        const tableBody = rankedData.map((proj, index) => [
          index + 1,
          proj.name,
          proj.pm,
          proj.items.length,
          proj.totalVal.toLocaleString("en-IN"),
        ]);

        doc.autoTable({
          startY: 48,
          head: [["#", "Project Name", "Manager", "Items", "Billing (INR)"]],
          body: tableBody,
          theme: "grid",
          headStyles: {
            fillColor: brandRed,
            textColor: 255,
            fontStyle: "bold",
          },
          columnStyles: {
            0: { halign: "center" },
            4: { halign: "right", fontStyle: "bold" },
          },
          foot: [
            [
              "",
              totalLabel,
              "",
              "",
              `Rs. ${totalBilling.toLocaleString("en-IN")}`,
            ],
          ],
          footStyles: {
            fillColor: [240, 240, 240],
            textColor: 0,
            fontStyle: "bold",
            halign: "right",
          },
        });

        const fileName = isForecast
          ? `Forecast_Report_${dateRangeText.replace(/ /g, "_")}.pdf`
          : `Actual_Report_${dateRangeText.replace(/ /g, "_")}.pdf`;
        doc.save(fileName);
      }
      function dateNtime(isoDate) {
        return new Date(isoDate).toLocaleString("en-IN", {
          timeZone: "Asia/Kolkata",
          day: "2-digit",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: true,
        });
      }
    </script>
  </body>
</html>
