/*--------------------------------------------------------------
# Font & Color Variables
# Help: https://bootstrapmade.com/color-system/
--------------------------------------------------------------*/
/* Fonts */
:root {
  --default-font:
    "Roboto", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue",
    Arial, "Noto Sans", "Liberation Sans", sans-serif, "Apple Color Emoji",
    "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
  --heading-font: "Raleway", sans-serif;
  --nav-font: "Montserrat", sans-serif;
}

/* Global Colors - The following color variables are used throughout the website. Updating them here will change the color scheme of the entire website */
:root {
  --background-color: #ffffff; /* Background color for the entire website, including individual sections */
  --default-color: #52413a; /* Default color used for the majority of the text content across the entire website */
  --heading-color: #31221c; /* Color for headings, subheadings and title throughout the website */
  --accent-color: #2a5071; /* Accent color that represents your brand on the website. It's used for buttons, links, and other elements that need to stand out */
  --surface-color: #ffffff; /* The surface color is used as a background of boxed elements within sections, such as cards, icon boxes, or other elements that require a visual separation from the global background. */
  --contrast-color: #ffffff; /* Contrast color for text, ensuring readability against backgrounds of accent, heading, or default colors. */
}

/* Nav Menu Colors - The following color variables are used specifically for the navigation menu. They are separate from the global colors to allow for more customization options */
:root {
  --nav-color: #52413a; /* The default color of the main navmenu links */
  --nav-hover-color: #f85d23; /* Applied to main navmenu links when they are hovered over or active */
  --nav-mobile-background-color: #ffffff; /* Used as the background color for mobile navigation menu */
  --nav-dropdown-background-color: #ffffff; /* Used as the background color for dropdown items that appear when hovering over primary navigation items */
  --nav-dropdown-color: #52413a; /* Used for navigation links of the dropdown items in the navigation menu. */
  --nav-dropdown-hover-color: #f85d23; /* Similar to --nav-hover-color, this color is applied to dropdown navigation links when they are hovered over. */
}

/* Color Presets - These classes override global colors when applied to any section or element, providing reuse of the sam color scheme. */

.light-background {
  --background-color: #f8f5f4;
  --surface-color: #ffffff;
}

.dark-background {
  --background-color: #060606;
  --default-color: #ffffff;
  --heading-color: #ffffff;
  --surface-color: #343333;
  --contrast-color: #ffffff;
}

/* Smooth scroll */
:root {
  scroll-behavior: smooth;
}

/*--------------------------------------------------------------
# General Styling & Shared Classes
--------------------------------------------------------------*/
body {
  color: var(--default-color);
  background-color: var(--background-color);
  font-family: var(--default-font);
}

a {
  color: var(--accent-color);
  text-decoration: none;
  transition: 0.3s;
}

}

h1,
h2,
h3,
h4,

h6 {

}

------------------------------*/

/*--------------------------------------------------------------
# Navigation Menu
--------------------------------------------------------------*/
/* Desktop Navigation */
@media (min-width: 1200px) {
  .navmenu {
    padding: 0;
  }

  .navmenu ul {
    margin: 0;
    padding: 0;
    display: flex;
    list-style: none;
    align-items: center;
  }

  .navmenu li {
    position: relative;
  }

  .navmenu > ul > li {
    white-space: nowrap;
    padding: 15px 14px;
  }

  .navmenu > ul > li:last-child {
    padding-right: 0;
  }

  .navmenu a,
  .navmenu a:focus {
    color: var(--nav-color);
    font-size: 15px;
    padding: 0 2px;
    font-family: var(--nav-font);
    font-weight: 400;
    display: flex;
    align-items: center;
    justify-content: space-between;
    white-space: nowrap;
    transition: 0.3s;
    position: relative;
  }

  .navmenu a i,
  .navmenu a:focus i {
    font-size: 12px;
    line-height: 0;
    margin-left: 5px;
    transition: 0.3s;
  }

  .navmenu > ul > li > a:before {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    bottom: -6px;
    left: 0;
    background-color: var(--accent-color);
    visibility: hidden;
    width: 0px;
    transition: all 0.3s ease-in-out 0s;
  }

  .navmenu a:hover:before,
  .navmenu li:hover > a:before,
  .navmenu .active:before {
    visibility: visible;
    width: 100%;
  }

  .navmenu li:hover > a,
  .navmenu .active,
  .navmenu .active:focus {
    color: var(--nav-hover-color);
  }

  .navmenu .dropdown ul {
    margin: 0;
    padding: 10px 0;
    background: var(--nav-dropdown-background-color);
    display: block;
    position: absolute;
    visibility: hidden;
    left: 14px;
    top: 130%;
    opacity: 0;
    transition: 0.3s;
    border-radius: 4px;
    z-index: 99;
    box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.1);
  }

  .navmenu .dropdown ul li {
    min-width: 200px;
  }

  .navmenu .dropdown ul a {
    padding: 10px 20px;
    font-size: 15px;
    text-transform: none;
    color: var(--nav-dropdown-color);
  }

  .navmenu .dropdown ul a i {
    font-size: 12px;
  }

  .navmenu .dropdown ul a:hover,
  .navmenu .dropdown ul .active:hover,
  .navmenu .dropdown ul li:hover > a {
    color: var(--nav-dropdown-hover-color);
  }

  .navmenu .dropdown:hover > ul {
    opacity: 1;
    top: 100%;
    visibility: visible;
  }

  .navmenu .dropdown .dropdown ul {
    top: 0;
    left: -90%;
    visibility: hidden;
  }

  .navmenu .dropdown .dropdown:hover > ul {
    opacity: 1;
    top: 0;
    left: -100%;
    visibility: visible;
  }
}

/* Mobile Navigation */
@media (max-width: 1199px) {
  .mobile-nav-toggle {
    color: var(--nav-color);
    font-size: 28px;
    line-height: 0;
    margin-right: 10px;
    cursor: pointer;
    transition: color 0.3s;
  }

  .navmenu {
    padding: 0;
    z-index: 9997;
  }

  .navmenu ul {
    display: none;
    list-style: none;
    position: absolute;
    inset: 60px 20px 20px 20px;
    padding: 10px 0;
    margin: 0;
    border-radius: 6px;
    background-color: var(--nav-mobile-background-color);
    border: 1px solid color-mix(in srgb, var(--default-color), transparent 90%);
    box-shadow: none;
    overflow-y: auto;
    transition: 0.3s;
    z-index: 9998;
  }

  .navmenu a,
  .navmenu a:focus {
    color: var(--nav-dropdown-color);
    padding: 10px 20px;
    font-family: var(--nav-font);
    font-size: 17px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
    white-space: nowrap;
    transition: 0.3s;
  }

  .navmenu a i,
  .navmenu a:focus i {
    font-size: 12px;
    line-height: 0;
    margin-left: 5px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: 0.3s;
    background-color: color-mix(in srgb, var(--accent-color), transparent 90%);
  }

  .navmenu a i:hover,
  .navmenu a:focus i:hover {
    background-color: var(--accent-color);
    color: var(--contrast-color);
  }

  .navmenu a:hover,
  .navmenu .active,
  .navmenu .active:focus {
    color: var(--nav-dropdown-hover-color);
  }

  .navmenu .active i,
  .navmenu .active:focus i {
    background-color: var(--accent-color);
    color: var(--contrast-color);
    transform: rotate(180deg);
  }

  .navmenu .dropdown ul {
    position: static;
    display: none;
    z-index: 99;
    padding: 10px 0;
    margin: 10px 20px;
    background-color: var(--nav-dropdown-background-color);
    transition: all 0.5s ease-in-out;
  }

  .navmenu .dropdown ul ul {
    background-color: rgba(33, 37, 41, 0.1);
  }

  .navmenu .dropdown > .dropdown-active {
    display: block;
    background-color: rgba(33, 37, 41, 0.03);
  }

  .mobile-nav-active {
    overflow: hidden;
  }

  .mobile-nav-active .mobile-nav-toggle {
    color: #fff;
    position: absolute;
    font-size: 32px;
    top: 15px;
    right: 15px;
    margin-right: 0;
    z-index: 9999;
  }

  .mobile-nav-active .navmenu {
    position: fixed;
    overflow: hidden;
    inset: 0;
    background: rgba(33, 37, 41, 0.8);
    transition: 0.3s;
  }

  .mobile-nav-active .navmenu > ul {
    display: block;
  }
}

/*--------------------------------------------------------------
# Clients Section
--------------------------------------------------------------*/
.clients {
  overflow-x: hidden;
  padding: 40px 0;
  /* Responsive adjustments */
}

.clients .clients-slider {
  position: relative;
  width: 100%;
  overflow: hidden;
  padding: 20px 0;
}

.clients .clients-slider:not(:last-child) {
  margin-bottom: 20px;
}

.clients .clients-track {
  display: flex;
  width: fit-content;
  animation-duration: 30s;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.clients .clients-track.track-1 {
  animation-name: scroll-left;
}

.clients .clients-track.track-2 {
  animation-name: scroll-right;
}

.clients .clients-track:hover {
  animation-play-state: paused;
}

.clients .clients-slide {
  flex: 0 0 auto;
  width: 200px;
  height: 100px;
  margin: 0 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--surface-color);
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.clients .clients-slide::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent,
    color-mix(in srgb, var(--default-color), transparent 96%),
    transparent
  );
  transition: 0.5s;
}

.clients .clients-slide:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}

.clients .clients-slide:hover::before {
  left: 100%;
}

.clients .clients-slide:hover img {
  filter: none;
  opacity: 1;
}

.clients .clients-slide img {
  max-width: 80%;
  max-height: 60%;
  filter: grayscale(100%);
  opacity: 0.7;
  transition: all 0.3s ease;
}

@keyframes scroll-left {
  0% {
    transform: translateX(0);
  }

  100% {
    transform: translateX(-2080px);
  }
}

@keyframes scroll-right {
  0% {
    transform: translateX(-2080px);
  }

  100% {
    transform: translateX(0);
  }
}

@media (max-width: 991px) {
  .clients .clients-slide {
    width: 180px;
    height: 90px;
    margin: 0 20px;
  }

  @keyframes scroll-left {
    0% {
      transform: translateX(0);
    }

    100% {
      transform: translateX(-1760px);
    }
  }

  @keyframes scroll-right {
    0% {
      transform: translateX(-1760px);
    }

    100% {
      transform: translateX(0);
    }
  }
}

@media (max-width: 767px) {
  .clients .clients-slide {
    width: 150px;
    height: 75px;
    margin: 0 15px;
  }

  @keyframes scroll-left {
    0% {
      transform: translateX(0);
    }

    100% {
      transform: translateX(-1440px);
    }
  }

  @keyframes scroll-right {
    0% {
      transform: translateX(-1440px);
    }

    100% {
      transform: translateX(0);
    }
  }
}

/* --- GLOBAL FIXES --- */
html,
body {
  overflow-x: hidden;
  width: 100%;
}

/* User Profile Blue Button */
.btn-user-blue {
  background-color: #2a5071;
  color: white !important;
  border-radius: 50px;
  padding: 5px 15px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  border: none;
  text-decoration: none;
  white-space: nowrap;
  cursor: pointer;
}
.btn-user-blue:hover,
.btn-user-blue:focus {
  background-color: #2a5071;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  outline: none;
}

/* Navigation Buttons (Common) */
.nav-btn-custom {
  font-weight: 600;
  padding: 8px 15px; /* Reduced side padding slightly */
  border-radius: 6px;
  text-align: center;
  text-decoration: none;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn-custom:active {
  transform: scale(0.95);
}

/* Dropdown Logic */
.dropdown-item {
  white-space: normal !important;
  word-wrap: break-word;
}
.dropdown-menu {
  max-width: 90vw;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}
.navbar-brand {
  margin-right: 0;
}
.right-icons-group {
  display: flex;
  align-items: center;
  gap: 15px;
}
.custom-nav-container {
  display: flex;
  gap: 8px;
} /* Small gap between buttons */

/* --- MOBILE STYLES (< 991px) --- */
@media (max-width: 991px) {
  .right-icons-group {
    order: 2;
    margin-left: auto;
  }

  .custom-nav-container {
    order: 3;
    width: 100%;
    flex-direction: row; /* FORCE ROW LAYOUT */
    justify-content: center; /* Center the group */
    margin-top: 15px;
    padding: 0 10px; /* Safe padding from screen edges */
  }

  .nav-btn-custom {
    width: auto;
    flex: 1; /* Make buttons grow equally */
    font-size: 0.85rem; /* Slightly smaller text for fit */
    padding: 8px 5px; /* Compact padding */
    max-width: 120px; /* Prevent them from getting huge */
  }

  .dropdown-menu-end {
    right: 0;
    left: auto;
  }
}

/* --- DESKTOP STYLES (> 992px) --- */
@media (min-width: 992px) {
  .custom-nav-container {
    order: 2;
    flex-direction: row;
    margin-left: auto;
    margin-right: 15px;
  }
  .right-icons-group {
    order: 3;
    margin-left: 0;
  }
  .nav-btn-custom {
    width: auto;
    padding: 8px 20px;
  }
}

    <script>
      (function () {

        async function authFetch(url, options = {}) {
          const res = await fetch(url, {
            ...options,
            headers: {
              ...options.headers,
              "Content-Type": "application/json",
            },
          });
          return res;
        }

        async function sessionCheck() {
          console.log("session valid (serverless mode)");
          return true;
        }

        window.sessionCheck = sessionCheck;
        window.authFetch = authFetch;

        async function logout() {
          console.log("Logout triggered");
          localStorage.removeItem("token");
        }
        window.logout = logout;

        function toggleScrolled() {
          const selectBody = document.querySelector("body");
          const selectHeader = document.querySelector("#header");
          if (!selectHeader) return;
          window.scrollY > 100
            ? selectBody.classList.add("scrolled")
            : selectBody.classList.remove("scrolled");
        }

        document.addEventListener("scroll", toggleScrolled);
        window.addEventListener("load", toggleScrolled);

        const mobileNavToggleBtn = document.querySelector(".mobile-nav-toggle");
        function mobileNavToogle() {
          document.querySelector("body").classList.toggle("mobile-nav-active");
          mobileNavToggleBtn.classList.toggle("bi-list");
          mobileNavToggleBtn.classList.toggle("bi-x");
        }
        if (mobileNavToggleBtn) {
          mobileNavToggleBtn.addEventListener("click", mobileNavToogle);
        }

        document.querySelectorAll("#navmenu a").forEach((navmenu) => {
          navmenu.addEventListener("click", () => {
            if (document.querySelector(".mobile-nav-active")) {
              mobileNavToogle();
            }
          });
        });

        function aosInit() {
          if (typeof AOS !== "undefined") {
            AOS.init({
              duration: 600,
              easing: "ease-in-out",
              once: true,
              mirror: false,
            });
          }
        }
        window.addEventListener("load", aosInit);

        function initSwiper() {
          document.querySelectorAll(".init-swiper").forEach(function (swiperElement) {
            let config = JSON.parse(
              swiperElement.querySelector(".swiper-config").innerHTML.trim()
            );
            if (typeof Swiper !== "undefined") {
              new Swiper(swiperElement, config);
            }
          });
        }
        window.addEventListener("load", initSwiper);

        let navmenulinks = document.querySelectorAll(".navmenu a");
        function navmenuScrollspy() {
          navmenulinks.forEach((navmenulink) => {
            if (!navmenulink.hash) return;
            let section = document.querySelector(navmenulink.hash);
            if (!section) return;
            let position = window.scrollY + 200;
            if (
              position >= section.offsetTop &&
              position <= section.offsetTop + section.offsetHeight
            ) {
              document
                .querySelectorAll(".navmenu a.active")
                .forEach((link) => link.classList.remove("active"));
              navmenulink.classList.add("active");
            } else {
              navmenulink.classList.remove("active");
            }
          });
        }
        window.addEventListener("load", navmenuScrollspy);
        document.addEventListener("scroll", navmenuScrollspy);
      })();

        if (el) el.innerText = "";
      }
      fetchUnreadCount();
    </script>

    <script>
      let database = [];
      const loader = document.getElementById("loader");
      function changeAssemblySort(mode) {
        state.assemblySort = mode;
        updateDashboard(); // Trigger re-render to apply sort
      }

      // --- 1. DATA LOADING & PARSING ---
      async function loadDashboardData() {
        loader.classList.remove("hidden-loader");

        const monthSet = new Set();
        const MONTH_ORDER = [
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
          "Jan",
          "Feb",
          "Mar",
        ];

        const endpoint =
          state.context === "forecast"
            ? `${API_URL}/excel/forecast/dashboard`
            : `${API_URL}/excel/actuals/dashboard`;

        try {
          const res = await fetch(endpoint);

          // Authorization bypass for serverless mode
          /*
          if (res.status === 401) {
            handleUnauthorized?.("Unauthorized");
            return;
          }
          */
          if (!res.ok) throw new Error("Fetch failed");

          const dbExcel = await res.json();
          // Uncomment below to see the actual keys if needed in DevTools
          // console.log("Excel row keys:", Object.keys(dbExcel.data[0]));

          // FY span removed per user request

          const formatDate = (iso) => {
            if (!iso) return "";
            const d = new Date(iso);
            const pad = (n) => String(n).padStart(2, "0");
            return `${pad(d.getDate())}-${pad(
              d.getMonth() + 1,
            )}-${d.getFullYear()}`;
          };
          // const updatedDate = formatDate(dbExcel.lastUpdated);
          if (state.context === "forecast") {
            // $("#excelUpdateTimeDiv").show();
            // $("#excelUpdateTimeDiv2").hide();
            document.getElementById("excelUpdateTimeDiv").style.display =
              "block";
            document.getElementById("excelUpdateTimeDiv2").style.display =
              "none";
          } else {
            // $("#excelUpdateTimeDiv2").show();
            // $("#excelUpdateTimeDiv").hide();
            document.getElementById("excelUpdateTimeDiv2").style.display =
              "block";
            document.getElementById("excelUpdateTimeDiv").style.display =
              "none";
          }
          const updatedDate = dateNtime(dbExcel.lastUpdated);
          document.getElementById("excelUpdateTime").innerText =
            "(last updated at " + updatedDate + ")";
          document.getElementById("excelUpdateTime2").innerText =
            "(last updated at " + updatedDate + ")";
          database = dbExcel.data.map((item, index) => {
            if (item.month) monthSet.add(item.month);
            const rawVal = String(item.billing || 0).replace(/[^0-9.-]/g, "");
            const val = parseFloat(rawVal) || 0;

            return {
              id: index + 1,
              name: item.project,
              pm: item.pm,
              product: item.category,
              month: item.month ? item.month.trim() : "",
              monthDisplay: item.monthDisplay || "",   // "May/26" format
              status: item.status || "Not Dispatched",
              source: item.source || "",
              val: val,
              date: formatDate(item.dispatchMonth),
              context: state.context,
              assembly: item.assembly,
              line: item.line,
              year: formatDate(item.dispatchMonth).split("-")[2],
            };
          });

          // --- CALCULATE DATE RANGE AND UPDATE HEADING ---
          const distinctMonths = [...monthSet].sort(
            (a, b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b),
          );

          // Month range text removed from header per request

          populateMonthFilter(distinctMonths);
          updateDashboard();
        } catch (err) {
          console.error("Data load failed:", err);
        } finally {
          loader.classList.add("hidden-loader");
        }
      }

      // --- 2. STATE MANAGEMENT ---
      let state = {
        context: "forecast",
        filters: { month: [], status: null },
        selection: { pm: null, product: null, month: null },
        expandedRows: [],
        sort: { key: "billing", direction: "desc" },
        assemblySort: "default",
      };

      const charts = {};

      function init() {
        initCharts();
        loadDashboardData();
      }

      function switchDataContext(context) {
        if (state.context === context) return;
        state.context = context;

        // --- BUTTON STYLES ---
        const forBtn = document.getElementById("toggle-forecast");
        const actBtn = document.getElementById("toggle-actuals");
        const statusContainer = document.getElementById(
          "dispatch-status-container",
        );

        if (context === "forecast") {
          statusContainer.style.display = "flex";
          forBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded bg-yogi-red text-white shadow-sm";
          actBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded text-gray-500 hover:text-gray-700";
        } else {
          statusContainer.style.display = "none";
          actBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded bg-yogi-red text-white shadow-sm";
          forBtn.className =
            "px-4 py-1.5 text-xs font-bold rounded text-gray-500 hover:text-gray-700";
          state.filters.status = null;
          document.getElementById("filter-status").value = "all";
        }

        // --- GRID LAYOUT ---

        const billingHead = document.querySelector("#billingHead p");

          if (lineTitle) lineTitle.innerText = "FORECASTED MONTHLY BILLING";

          if (assemblyHead) assemblyHead.innerText = "ASSEMBLIES DISPATCHED";
          if (avgMonthlyHead)

      // --- 3. FILTERING LOGIC ---
      function getData(mode = "highlight") {
        return database.filter((row) => {
          // --- UPDATED SMART FILTER LOGIC ---
          if (state.filters.status) {
            const filterVal = state.filters.status;

            // If selected value is a Status (from Col H)
            if (["Dispatched", "Not Dispatched", "Hold"].includes(filterVal)) {
              if (row.status !== filterVal) return false;
            }
            // If selected value is a Source (from Col B)
            else if (["BOI", "Inhouse"].includes(filterVal)) {
              if (row.source !== filterVal) return false;
            }
          }

          if (
            state.filters.month.length > 0 &&
            !state.filters.month.includes(row.month)
          )
            return false;
          if (mode === "highlight") {
            if (state.selection.pm && row.pm !== state.selection.pm)
              return false;
            if (
              state.selection.product &&
              row.product !== state.selection.product
            )
              return false;
            if (state.selection.month && row.month !== state.selection.month)
              return false;
          }
          return true;
        });
      }

        state.selection[type] = state.selection[type] === value ? null : value;

      function updateKPIs(data) {
        const totalVal = data.reduce((sum, d) => sum + d.val, 0);
        const totalProj = new Set(data.map((d) => d.name)).size;
        const totalAssm = data.filter(
          (d) => d.assembly && d.assembly.trim() !== "",
        ).length;

        // Average monthly: divide by 12 if no months selected, else by selected month count
        const selectedMonthCount = state.filters.month.length;
        const divisor = selectedMonthCount > 0 ? selectedMonthCount : 12;

        document.getElementById("kpi-projects").innerText = totalProj;
        document.getElementById("kpi-revenue").innerText =
          "₹ " +
          (totalVal / 10000000).toLocaleString("en-IN", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }) +
          " Cr";
        document.getElementById("kpi-assemblies").innerText = totalAssm;

        const avg = divisor > 0 ? totalVal / 10000000 / divisor : 0;
        document.getElementById("kpi-avg").innerText =
          "₹ " +
          avg.toLocaleString("en-IN", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }) +
          " Cr";
      }

      // --- CHART DATA UPDATES ---
      function updateVisuals(baseData, highlightData, hasSelection) {
        const FISCAL_MONTH_ORDER = ["Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar"];
        const colors = {
          red: "#a81818",
          pink: "#fca5a5",
          gray: "#e5e7eb",

          pieBase: [
            "#B02A37", "#2E4F6E", "#8C1D2D", "#E8A838", "#6C757D",
            "#ADB5BD", "#D4A574", "#4A7C59", "#C4553A", "#7B6B8D",
            "#E5E0DA", "#3B7DD8", "#9B2335", "#5C8A4D", "#D98C5F",
          ],
        };

        const groupBy = (data, key) => {
          const map = {};
          data.forEach((d) => {
            map[d[key]] = (map[d[key]] || 0) + d.val;
          });
          return map;
        };

        // --- 1. BAR CHART ---
        const pmData = groupBy(baseData, "pm");
        const pmHighlightSet = hasSelection
          ? new Set(highlightData.map((d) => d.pm))
          : null;
        const sortedPMs = Object.keys(pmData).sort(
          (a, b) => pmData[a] - pmData[b],
        );

        charts.bar.data.labels = sortedPMs;
        charts.bar.data.datasets = [
          {
            data: sortedPMs.map((pm) => (pmData[pm] / 10000000).toFixed(2)),
            backgroundColor: sortedPMs.map((pm) => {
              if (!hasSelection) return colors.red;
              return pmHighlightSet.has(pm) ? colors.red : colors.pink;
            }),
            borderRadius: 4,
            barThickness: 25,
          },
        ];
        charts.bar.update();

        // --- 2. PIE / DONUT CHART ---
        if (state.context === "forecast") {
          // FORECAST: Donut, Legend Right, Labels Outside (Value Only)
          const prodData = groupBy(baseData, "product");
          const prodHighlightSet = new Set(highlightData.map((d) => d.product));

          charts.pie.options.cutout = "50%";
          charts.pie.options.layout.padding = 30;
          charts.pie.options.plugins.legend.display = true;
          
          charts.pie.options.plugins.datalabels = {
            display: true,
            color: "#333",
            anchor: "end",
            align: "end",
            offset: 5,
            font: { weight: "bold", size: 10 },
            formatter: (val) => (val / 10000000).toFixed(2),
          };

          charts.pie.data.labels = Object.keys(prodData);
          charts.pie.data.datasets = [
            {
              data: Object.values(prodData),
              backgroundColor: Object.keys(prodData).map((p, i) =>
                !hasSelection || prodHighlightSet.has(p)
                  ? colors.pieBase[i % colors.pieBase.length]
                  : colors.gray,
              ),
              borderColor: "#fff",
              borderWidth: 2,
            },
          ];
        } else {
          // REVENUE: Pie, No Legend, Labels Outside (Name + Value)
          const pmCountMap = {};
          baseData.forEach((d) => {
            // Count occurrences of Assemblies (Column D)
            if (d.assembly && d.assembly.trim() !== "")
              pmCountMap[d.pm] = (pmCountMap[d.pm] || 0) + 1;
          });

          // UPDATED LOGIC: Sort by Count Descending
          const sortedEntries = Object.entries(pmCountMap).sort(
            (a, b) => b[1] - a[1],
          );
          const pmKeys = sortedEntries.map((e) => e[0]);
          const pmValues = sortedEntries.map((e) => e[1]);

          charts.pie.options.cutout = "0%";
          charts.pie.options.layout.padding = 60;
          charts.pie.options.plugins.legend.display = false;
          charts.pie.options.plugins.datalabels = {
            display: true,
            color: "#333",
            anchor: "end",
            align: "end",
            offset: 5,
            font: { weight: "bold", size: 10 },
            formatter: (val, ctx) =>
              `${ctx.chart.data.labels[ctx.dataIndex]} ${val}`,
          };

          charts.pie.data.labels = pmKeys;
          charts.pie.data.datasets = [
            {
              data: pmValues,
              backgroundColor: pmKeys.map(
                (k, i) => colors.pieBase[i % colors.pieBase.length],
              ),
              borderColor: "#fff",
              borderWidth: 1,
            },
          ];
        }
        charts.pie.update();

        // --- 3. LINE CHART (Fiscal order: Apr → Mar) ---
        const monthData = groupBy(baseData, "month");
        const monthHighlightSet = new Set(highlightData.map((d) => d.month));
        const labels = Object.keys(monthData).sort(
          (a, b) => FISCAL_MONTH_ORDER.indexOf(a) - FISCAL_MONTH_ORDER.indexOf(b)
        );

        charts.line.data.labels = labels;
        charts.line.data.datasets = [
          {

            tension: 0.3,

            pointBackgroundColor: labels.map((m) =>
              !hasSelection || monthHighlightSet.has(m) ? colors.red : "#fff",
            ),
          },
        ];
        charts.line.update();
      }

                  const statusBadge =
                    i.status === "Dispatched"
                      ? `<span class="success-badge">${i.monthDisplay || (i.month + '/' + (i.year || '').slice(-2))}</span>`
                      : `<span>${i.monthDisplay || (i.month + '/' + (i.year || '').slice(-2))}</span>`;

                  return `<div class="grid grid-cols-3 items-center py-2 border-b border-gray-200 dark:border-gray-200 dark:border-slate-700/50 last:border-0 text-sm hover:bg-gray-100 dark:hover:bg-gray-100 dark:bg-slate-800/50 transition-colors w-full gap-4">
<span class="text-gray-700 dark:text-slate-300 pl-4 border-l-2 ${
                    i.status === "Dispatched"
                      ? "border-emerald-500"
                      : "border-slate-500"
                  }">

                ${i.assembly || "—"}
</span>
<span class="text-gray-500 dark:text-slate-400 flex items-center justify-center text-center">${statusBadge}</span>
<span class="text-right font-bold text-gray-900 dark:text-sky-300">₹${i.val.toLocaleString(
                    "en-IN",
                  )}</span></div>`;
                })

                .join("");
            } else {
              // Keep existing layout for 'actuals' context if necessary, or update similarly

              headerHtml = `<h4 class="col-12 text-xs font-bold text-yogi-red dark:text-sky-400/80 uppercase mb-2 tracking-widest">Assembly Breakdown</h4>`;

              itemsHtml = sortedItems

                .map(
                  (i) =>
                    `<div class="row py-2 border-b border-gray-200 dark:border-gray-200 dark:border-slate-700/50 last:border-0 text-sm"><span class="col-12 text-gray-700 dark:text-slate-300 pl-4 border-l-2 border-slate-500">${
                      i.assembly || "—"
                    }</span></div>`,
                )

                .join("");
            }

            if (sortedItems.length === 0)
              itemsHtml = `<div class="p-3 text-center text-gray-400 dark:text-slate-500 text-xs italic">No detailed assemblies available</div>`;

            childTr.innerHTML = `<td colspan="6" class="p-0"><div class="expand-row px-6 py-4 shadow-sm dark:shadow-inner bg-gray-50 dark:bg-slate-900 border-x border-b border-gray-200 dark:border-slate-700 mx-4 mb-4 rounded-b-lg"><div class="row mb-3"><button class="bg-rose-500 text-white px-3 py-1 rounded-md text-xs font-bold hover:bg-rose-600 transition shadow-[0_0_8px_rgba(244,63,94,0.5)]" onclick="generateProjectPDF('${rowId}')"><i class="fa-solid fa-file-pdf mr-2"></i> Download PDF Report</button></div>${headerHtml}${itemsHtml}</div></td>`;

            tbody.appendChild(childTr);
          }
        });
      }

      function toggleProjectExpansion(id) {
        const idx = state.expandedRows.indexOf(id);
        if (idx > -1) state.expandedRows.splice(idx, 1);
        else state.expandedRows.push(id);
        updateDashboard();
      }

      function updateFilterChips() {
        const container = document.getElementById("active-filters-container");
        container.innerHTML = "";
        let hasFilter = false;
        const allFilters = { ...state.filters, ...state.selection };

        Object.entries(allFilters).forEach(([key, val]) => {
          if (val && (Array.isArray(val) ? val.length > 0 : true)) {
            hasFilter = true;
            const isSelection = key in state.selection;
            const bgClass = isSelection
              ? "bg-red-100 text-red-800"
              : "bg-blue-100 text-blue-800";
            const displayVal = Array.isArray(val)
              ? `${val.length} Months`
              : val;
            const chip = document.createElement("div");
            chip.className = `${bgClass} text-xs font-semibold px-2 py-1 rounded flex items-center gap-1`;
            const closeAction = isSelection
              ? `applyChartFilter('${key}', '${val}')`
              : `applySlicer('${key}', 'all'); if(document.getElementById('filter-${key}')) document.getElementById('filter-${key}').value='all'`;
            chip.innerHTML = `<span>${key.toUpperCase()}: ${displayVal}</span><button onclick="${closeAction}" class="hover:text-red-600 font-bold">&times;</button>`;
            container.appendChild(chip);
          }
        });
        container.classList.toggle("hidden", !hasFilter);
      }

      function toggleBillingSort() {
        state.sort.direction = state.sort.direction === "asc" ? "desc" : "asc";
        document.getElementById("billingSortIcon").innerText =
          state.sort.direction === "asc" ? "▲" : "▼";
        updateDashboard();
      }

      function populateMonthFilter(months) {
        const list = document.getElementById("monthDropdownList");
        list.innerHTML = "";
        if (months.length === 0) {
          list.innerHTML = `<div class="p-2 text-xs text-gray-500">No data</div>`;
          return;
        }
        months.forEach((m) => {
          const item = document.createElement("div");
          item.className =
            "flex items-center px-4 py-2 bg-gray-50 dark:bg-gray-100 dark:bg-slate-800/80 hover:bg-slate-700 cursor-pointer transition-colors border-b border-gray-200 dark:border-gray-200 dark:border-slate-700/50 last:border-0";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = state.filters.month.includes(m);
          checkbox.className =
            "form-checkbox h-4 w-4 rounded border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900 focus:ring-sky-400 text-sky-400 pointer-events-none";
          const span = document.createElement("span");
          span.className = "ml-3 text-sm text-gray-800 dark:text-slate-200 select-none font-medium";
          span.innerText = m;
          item.appendChild(checkbox);
          item.appendChild(span);
          item.onclick = (e) => {
            e.stopPropagation();
            toggleMonthFilter(m);
            checkbox.checked = state.filters.month.includes(m);
          };
          list.appendChild(item);
        });
      }

      function toggleMonthFilter(month) {
        const idx = state.filters.month.indexOf(month);
        if (idx > -1) state.filters.month.splice(idx, 1);
        else state.filters.month.push(month);
        document.getElementById("monthBtnText").innerText =
          state.filters.month.length === 0
            ? "All Months"
            : `${state.filters.month.length} Selected`;
        updateDashboard();
      }

      function toggleMonthDropdown() {
        document.getElementById("monthDropdownList").classList.toggle("hidden");
      }
      window.addEventListener("click", (e) => {
        const btn = document.getElementById("monthDropdownBtn");
        const list = document.getElementById("monthDropdownList");
        if (!btn.contains(e.target) && !list.contains(e.target))
          list.classList.add("hidden");
      });

      document.addEventListener("DOMContentLoaded", init);

      async function generateProjectPDF(rowId) {
        const { jsPDF } = window.jspdf;
        let project;
        if (String(rowId).startsWith("proj_")) {
          const idx = parseInt(rowId.split("_")[1]);
          project = window.currentTableData[idx];
        } else {
          project = window.currentTableData.find((p) => p.id === rowId);
        }

        if (!project) {
          alert("Error: Project data not found.");
          return;
        }

        const doc = new jsPDF();
        const brandRed = "#a81818";
        const logo = document.getElementById("pdfLogo");
        if (logo) doc.addImage(logo, "PNG", 14, 10, 40, 15);

        // --- DYNAMIC CONTENT LOGIC ---
        const isForecast = state.context === "forecast";
        const reportTitle = isForecast
          ? "Detailed Forecast Assembly Overview"
          : "Detailed Actual Assembly Overview";

        const fyText = isForecast ? "FY 2026-27" : "FY 2025-26";

        doc.setFontSize(15);
        doc.setTextColor(brandRed);
        doc.text(reportTitle, 14, 34);

        doc.setFontSize(9);
        doc.setTextColor(100);
        doc.text(fyText, 14, 40);

        const startY = 46;
        doc.setFillColor(245, 245, 245);
        doc.rect(14, startY, 182, 20, "F");

        doc.setFontSize(10);
        doc.setTextColor(0);
        doc.setFont("helvetica", "bold");
        doc.text("Project Name:", 18, startY + 8);
        doc.setFont("helvetica", "normal");
        doc.text(project.name, 18, startY + 14);

        doc.setFont("helvetica", "bold");
        doc.text("Project Manager:", 90, startY + 8);
        doc.setFont("helvetica", "normal");
        doc.text(project.pm, 90, startY + 14);

        // Only show Total Value if in Forecast mode
        // if (isForecast) {
        doc.setFont("helvetica", "bold");
        doc.text("Total Billing Value:", 140, startY + 8);
        doc.setFont("helvetica", "normal");
        doc.text(
          `Rs. ${project.totalVal.toLocaleString("en-IN")}`,
          140,
          startY + 14,
        );
        // }

        // --- DYNAMIC TABLE COLUMNS ---
        let tableHead, tableBody, columnStyles;

        if (isForecast) {
          tableHead = [
            ["Assembly Name", "Dispatch Track", "Billing Value (INR)"],
          ];
          tableBody = project.items.map((item) => [
            item.assembly,
            `${item.month} ${item.year}`,
            item.val.toLocaleString("en-IN"),
          ]);
          columnStyles = { 2: { halign: "right" } };
        } else {
          // For Actuals: Remove Date and Value columns
          tableHead = [["Assembly Name"]];
          tableBody = project.items.map((item) => [item.assembly]);
          columnStyles = {};
        }

        doc.autoTable({
          startY: startY + 26,
          head: tableHead,
          body: tableBody,
          theme: "grid",
          headStyles: {
            fillColor: brandRed,
            textColor: 255,
            fontStyle: "bold",
          },
          columnStyles: columnStyles,
          styles: { fontSize: 9, cellPadding: 3 },
        });

        const prefix = isForecast ? "forecast" : "actual";
        const safeName = project.name.replace(/[^a-z0-9]/gi, "_").toLowerCase();
        doc.save(`${prefix}_${safeName}_report.pdf`);
      }

      function generateRankedMonthPDF() {
        const { jsPDF } = window.jspdf;
        if (!window.currentTableData || window.currentTableData.length === 0) {
          alert("No data available to export.");
          return;
        }
        const doc = new jsPDF();
        const brandRed = "#a81818";
        const logo = document.getElementById("pdfLogo");
        if (logo) doc.addImage(logo, "PNG", 14, 10, 40, 15);

        // --- DYNAMIC DATA CALCULATION ---
        const isForecast = state.context === "forecast";
        const reportTitle = isForecast
          ? "Project Forecast Report"
          : "Actual Revenue Report";
        const totalLabel = isForecast
          ? "TOTAL FORECAST"
          : "TOTAL ACTUAL REVENUE";

        // Added static text since FY span was removed
        const fyText = isForecast ? "FY 2026-27" : "FY 2025-26";

        // Determine Date Range from Filters
        let dateRangeText = "Full Financial Year";
        if (state.filters.month && state.filters.month.length > 0) {
          const MONTH_ORDER = [
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec",
            "Jan",
            "Feb",
            "Mar",
          ];
          const selected = [...state.filters.month].sort(
            (a, b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b),
          );

          if (selected.length === 1) {
            dateRangeText = `Month: ${selected[0]}`;
          } else {
            dateRangeText = `Period: ${selected[0]} to ${
              selected[selected.length - 1]
            }`;
          }
        }

        // --- PDF HEADER ---
        doc.setFontSize(16);
        doc.setTextColor(brandRed);
        doc.text(reportTitle, 14, 35);

        doc.setFontSize(10);
        doc.setTextColor(100);
        // This adds "FY 2025-26 | Period: Apr to Aug" under the title
        doc.text(`${fyText}  |  ${dateRangeText}`, 14, 42);

        const rankedData = [...window.currentTableData].sort(
          (a, b) => b.totalVal - a.totalVal,
        );
        const totalBilling = rankedData.reduce((sum, p) => sum + p.totalVal, 0);

        const tableBody = rankedData.map((proj, index) => [
          index + 1,
          proj.name,
          proj.pm,
          proj.items.length,
          proj.totalVal.toLocaleString("en-IN"),
        ]);

        doc.autoTable({
          startY: 48,
          head: [["#", "Project Name", "Manager", "Items", "Billing (INR)"]],
          body: tableBody,
          theme: "grid",
          headStyles: {
            fillColor: brandRed,
            textColor: 255,
            fontStyle: "bold",
          },
          columnStyles: {
            0: { halign: "center" },
            4: { halign: "right", fontStyle: "bold" },
          },
          foot: [
            [
              "",
              totalLabel,
              "",
              "",
              `Rs. ${totalBilling.toLocaleString("en-IN")}`,
            ],
          ],
          footStyles: {
            fillColor: [240, 240, 240],
            textColor: 0,
            fontStyle: "bold",
            halign: "right",
          },
        });

        const fileName = isForecast
          ? `Forecast_Report_${dateRangeText.replace(/ /g, "_")}.pdf`
          : `Actual_Report_${dateRangeText.replace(/ /g, "_")}.pdf`;
        doc.save(fileName);
      }
      function dateNtime(isoDate) {
        return new Date(isoDate).toLocaleString("en-IN", {
          timeZone: "Asia/Kolkata",
          day: "2-digit",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: true,
        });
      }
    </script>
  </body>
</html>
